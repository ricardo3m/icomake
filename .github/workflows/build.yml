name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release|x86
        run: msbuild icomake.sln /p:Configuration=Release /p:Platform=x86

      - name: Build Release|x64
        run: msbuild icomake.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload Win32 executable
        uses: actions/upload-artifact@v4
        with:
          name: icomake-win32
          path: Release/icomake.exe

      - name: Upload x64 executable
        uses: actions/upload-artifact@v4
        with:
          name: icomake-x64
          path: x64/Release/icomake.exe

      - name: Commit compiled executables
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Release/icomake.exe x64/Release/icomake.exe
          git diff --cached --quiet || git commit -m "chore: update compiled executables [skip ci]"
          git push
